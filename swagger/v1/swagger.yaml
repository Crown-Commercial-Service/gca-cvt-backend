---
openapi: 3.0.1
info:
  title: Commercial Value Tool API
  version: v1
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
paths:
  "/api/v1/contracts":
    get:
      summary: List contracts
      tags:
      - Contracts
      parameters:
      - name: search
        in: query
        required: false
        description: Free-text search matched against title and OCID
        schema:
          type: string
      - name: sort
        in: query
        required: false
        enum:
        - title
        - ocid
        - amount
        - start_date
        - end_date
        - status
        description: "Column to sort by:\n * `title` \n * `ocid` \n * `amount` \n
          * `start_date` \n * `end_date` \n * `status` \n "
        schema:
          type: string
      - name: direction
        in: query
        required: false
        enum:
        - asc
        - desc
        description: Sort direction
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: value_min
        in: query
        required: false
        description: Minimum contract value (accepts comma-formatted numbers, e.g.
          1,000)
        schema:
          type: string
      - name: value_max
        in: query
        required: false
        description: Maximum contract value (accepts comma-formatted numbers, e.g.
          1,000,000)
        schema:
          type: string
      - name: status
        in: query
        required: false
        enum:
        - completed
        - in_progress
        description: Contract status derived from calculation_completed
        schema:
          type: string
      - name: start_date_from_day
        in: query
        required: false
        description: Start date range lower bound — day
        schema:
          type: integer
      - name: start_date_from_month
        in: query
        required: false
        description: Start date range lower bound — month
        schema:
          type: integer
      - name: start_date_from_year
        in: query
        required: false
        description: Start date range lower bound — year
        schema:
          type: integer
      - name: start_date_to_day
        in: query
        required: false
        description: Start date range upper bound — day
        schema:
          type: integer
      - name: start_date_to_month
        in: query
        required: false
        description: Start date range upper bound — month
        schema:
          type: integer
      - name: start_date_to_year
        in: query
        required: false
        description: Start date range upper bound — year
        schema:
          type: integer
      - name: end_date_from_day
        in: query
        required: false
        description: End date range lower bound — day
        schema:
          type: integer
      - name: end_date_from_month
        in: query
        required: false
        description: End date range lower bound — month
        schema:
          type: integer
      - name: end_date_from_year
        in: query
        required: false
        description: End date range lower bound — year
        schema:
          type: integer
      - name: end_date_to_day
        in: query
        required: false
        description: End date range upper bound — day
        schema:
          type: integer
      - name: end_date_to_month
        in: query
        required: false
        description: End date range upper bound — month
        schema:
          type: integer
      - name: end_date_to_year
        in: query
        required: false
        description: End date range upper bound — year
        schema:
          type: integer
      responses:
        '200':
          description: contracts filtered by status
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - meta
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - record_id
                      - title
                      - ocid
                      - status
                      properties:
                        record_id:
                          type: integer
                        title:
                          type: string
                        ocid:
                          type: string
                        amount:
                          type: string
                          nullable: true
                        start_date:
                          type: string
                          format: date
                          nullable: true
                        end_date:
                          type: string
                          format: date
                          nullable: true
                        status:
                          type: string
                          enum:
                          - completed
                          - in_progress
                  meta:
                    type: object
                    required:
                    - page
                    - total_pages
                    - total_count
                    - per_page
                    - sort_column
                    - sort_direction
                    properties:
                      page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      per_page:
                        type: integer
                      sort_column:
                        type: string
                      sort_direction:
                        type: string
