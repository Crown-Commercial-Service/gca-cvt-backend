---
openapi: 3.0.1
info:
  title: Commercial Value Tool API
  version: v1
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: www.example.com
paths:
  "/api/v1/contracts":
    get:
      summary: List contracts
      tags:
      - Contracts
      parameters:
      - name: search
        in: query
        required: false
        description: Free-text search matched against title and OCID
        schema:
          type: string
      - name: sort
        in: query
        required: false
        enum:
        - title
        - ocid
        - amount
        - start_date
        - end_date
        - status
        description: "Column to sort by:\n * `title` \n * `ocid` \n * `amount` \n
          * `start_date` \n * `end_date` \n * `status` \n "
        schema:
          type: string
      - name: direction
        in: query
        required: false
        enum:
        - asc
        - desc
        description: Sort direction
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: value_min
        in: query
        required: false
        description: Minimum contract value (accepts comma-formatted numbers, e.g.
          1,000)
        schema:
          type: string
      - name: value_max
        in: query
        required: false
        description: Maximum contract value (accepts comma-formatted numbers, e.g.
          1,000,000)
        schema:
          type: string
      - name: status
        in: query
        required: false
        enum:
        - completed
        - in_progress
        description: Contract status derived from calculation_completed
        schema:
          type: string
      - name: start_date_from_day
        in: query
        required: false
        description: Start date range lower bound — day
        schema:
          type: integer
      - name: start_date_from_month
        in: query
        required: false
        description: Start date range lower bound — month
        schema:
          type: integer
      - name: start_date_from_year
        in: query
        required: false
        description: Start date range lower bound — year
        schema:
          type: integer
      - name: start_date_to_day
        in: query
        required: false
        description: Start date range upper bound — day
        schema:
          type: integer
      - name: start_date_to_month
        in: query
        required: false
        description: Start date range upper bound — month
        schema:
          type: integer
      - name: start_date_to_year
        in: query
        required: false
        description: Start date range upper bound — year
        schema:
          type: integer
      - name: end_date_from_day
        in: query
        required: false
        description: End date range lower bound — day
        schema:
          type: integer
      - name: end_date_from_month
        in: query
        required: false
        description: End date range lower bound — month
        schema:
          type: integer
      - name: end_date_from_year
        in: query
        required: false
        description: End date range lower bound — year
        schema:
          type: integer
      - name: end_date_to_day
        in: query
        required: false
        description: End date range upper bound — day
        schema:
          type: integer
      - name: end_date_to_month
        in: query
        required: false
        description: End date range upper bound — month
        schema:
          type: integer
      - name: end_date_to_year
        in: query
        required: false
        description: End date range upper bound — year
        schema:
          type: integer
      responses:
        '200':
          description: contracts filtered by status
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - meta
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                      - record_id
                      - title
                      - ocid
                      - status
                      properties:
                        record_id:
                          type: integer
                        title:
                          type: string
                        ocid:
                          type: string
                        amount:
                          type: string
                          nullable: true
                        start_date:
                          type: string
                          format: date
                          nullable: true
                        end_date:
                          type: string
                          format: date
                          nullable: true
                        status:
                          type: string
                          enum:
                          - completed
                          - in_progress
                  meta:
                    type: object
                    required:
                    - page
                    - total_pages
                    - total_count
                    - per_page
                    - sort_column
                    - sort_direction
                    properties:
                      page:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      per_page:
                        type: integer
                      sort_column:
                        type: string
                      sort_direction:
                        type: string
  "/api/v1/savings/{ocid}":
    get:
      summary: Get all savings for an OCID
      tags:
      - Savings
      parameters:
      - name: ocid
        in: path
        required: true
        description: OCID of the contract whose savings should be returned
        schema:
          type: string
      responses:
        '200':
          description: savings returned for an OCID whose contract has no savings
            yet
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - contract
                    - cashable_savings
                    - non_cashable_savings
                    - non_monetisable_savings
                    properties:
                      contract:
                        type: object
                        required:
                        - record_id
                        - ocid
                        - title
                        - calculation_completed
                        properties:
                          record_id:
                            type: integer
                          ocid:
                            type: string
                          title:
                            type: string
                          amount:
                            type: string
                            nullable: true
                          currency:
                            type: string
                            nullable: true
                          start_date:
                            type: string
                            format: date
                            nullable: true
                          end_date:
                            type: string
                            format: date
                            nullable: true
                          calculation_completed:
                            type: boolean
                          description:
                            type: string
                            nullable: true
                          cpv_code:
                            type: string
                            nullable: true
                          cpv_description:
                            type: string
                            nullable: true
                          notice_type:
                            type: string
                            nullable: true
                          source_api:
                            type: string
                            nullable: true
                      cashable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          - cashable_savings
                          - baseline_approach
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            cashable_savings:
                              type: boolean
                            baseline_approach:
                              type: string
                            baseline_value:
                              type: string
                              nullable: true
                      non_cashable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            savings_value:
                              type: string
                              nullable: true
                      non_monetisable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
        '404':
          description: no contract exists for the given OCID
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
    put:
      summary: Update savings for an OCID
      tags:
      - Savings
      parameters:
      - name: ocid
        in: path
        required: true
        description: OCID of the contract whose savings should be updated
        schema:
          type: string
      responses:
        '200':
          description: savings updated; response mirrors GET /api/v1/savings/{ocid}
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - contract
                    - cashable_savings
                    - non_cashable_savings
                    - non_monetisable_savings
                    properties:
                      contract:
                        type: object
                        required:
                        - record_id
                        - ocid
                        - title
                        - calculation_completed
                        properties:
                          record_id:
                            type: integer
                          ocid:
                            type: string
                          title:
                            type: string
                          amount:
                            type: string
                            nullable: true
                          currency:
                            type: string
                            nullable: true
                          start_date:
                            type: string
                            format: date
                            nullable: true
                          end_date:
                            type: string
                            format: date
                            nullable: true
                          calculation_completed:
                            type: boolean
                          description:
                            type: string
                            nullable: true
                          cpv_code:
                            type: string
                            nullable: true
                          cpv_description:
                            type: string
                            nullable: true
                          notice_type:
                            type: string
                            nullable: true
                          source_api:
                            type: string
                            nullable: true
                      cashable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          - cashable_savings
                          - baseline_approach
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            cashable_savings:
                              type: boolean
                            baseline_approach:
                              type: string
                            baseline_value:
                              type: string
                              nullable: true
                      non_cashable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                            savings_value:
                              type: string
                              nullable: true
                      non_monetisable_savings:
                        type: array
                        items:
                          type: object
                          required:
                          - id
                          - ocid
                          - contract_record_id
                          - savings_type
                          properties:
                            id:
                              type: integer
                            ocid:
                              type: string
                            contract_record_id:
                              type: integer
                            savings_type:
                              type: string
                            submitted_by_id:
                              type: integer
                              nullable: true
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
        '404':
          description: no contract exists for the OCID, or a referenced savings_id
            is missing or belongs to a different OCID
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '422':
          description: a savings update item omitted savings_id, or persistence failed
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Per-type arrays of savings updates. Each item must include
                a savings_id; only fields listed for that type are persisted. Optional
                calculation_completed flips the latest contract row at the end of
                the journey.
              properties:
                calculation_completed:
                  type: boolean
                cashable_savings:
                  type: array
                  items:
                    type: object
                    required:
                    - savings_id
                    properties:
                      savings_id:
                        type: integer
                      savings_type:
                        type: string
                      cashable_savings:
                        type: boolean
                      baseline_approach:
                        type: string
                      baseline_value:
                        type: number
                      submitted_by_id:
                        type: integer
                non_cashable_savings:
                  type: array
                  items:
                    type: object
                    required:
                    - savings_id
                    properties:
                      savings_id:
                        type: integer
                      savings_type:
                        type: string
                      savings_value:
                        type: number
                      submitted_by_id:
                        type: integer
                non_monetisable_savings:
                  type: array
                  items:
                    type: object
                    required:
                    - savings_id
                    properties:
                      savings_id:
                        type: integer
                      savings_type:
                        type: string
                      submitted_by_id:
                        type: integer
        required: true
    post:
      summary: Create a new savings record for an OCID
      tags:
      - Savings
      parameters:
      - name: ocid
        in: path
        required: true
        description: OCID of the contract under which the new savings record will
          be created
        schema:
          type: string
      responses:
        '201':
          description: savings record created; response carries the generated savings_id
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                properties:
                  data:
                    type: object
                    required:
                    - savings_id
                    - type
                    properties:
                      savings_id:
                        type: integer
                      type:
                        type: string
                        enum:
                        - cashable
                        - non-cashable
                        - non-monetisable
        '404':
          description: no contract exists for the given OCID
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '422':
          description: the type slug is missing or unknown
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - saving
              description: Creates a single savings record. The +type+ slug selects
                the target table; only the per-type permitted fields inside +saving+
                are persisted.
              properties:
                type:
                  type: string
                  enum:
                  - cashable
                  - non-cashable
                  - non-monetisable
                saving:
                  type: object
                  description: Per-type savings attributes. Unknown keys are ignored.
                  properties:
                    savings_type:
                      type: string
                    submitted_by_id:
                      type: integer
                    cashable_savings:
                      type: boolean
                      description: Cashable only
                    baseline_approach:
                      type: string
                      description: Cashable only
                    baseline_value:
                      type: number
                      description: Cashable only
                    savings_value:
                      type: number
                      description: Non-cashable only
        required: true
  "/api/v1/savings/{type}/{savings_id}":
    delete:
      summary: Soft-delete a single savings record
      tags:
      - Savings
      parameters:
      - name: type
        in: path
        required: true
        enum:
        - cashable
        - non-cashable
        - non-monetisable
        description: "Savings record type:\n * `cashable` \n * `non-cashable` \n *
          `non-monetisable` \n "
        schema:
          type: string
      - name: savings_id
        in: path
        required: true
        description: Identifier of the savings record to delete
        schema:
          type: integer
      responses:
        '204':
          description: savings record soft-deleted
        '404':
          description: no active savings record matches the given type and id
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                properties:
                  error:
                    type: object
                    required:
                    - code
                    - message
                    properties:
                      code:
                        type: string
                      message:
                        type: string
